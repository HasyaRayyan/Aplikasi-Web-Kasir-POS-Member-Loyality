<ion-content [fullscreen]="true" class="catalog-content">
  <div class="wrapper">
    
    <!-- HEADER -->
    <div class="header">
      <div class="header-left">
        <div class="back-btn" (click)="goBack()">
          <ion-icon name="arrow-back"></ion-icon>
        </div>
        <div class="title-wrap">
          <!-- <p class="subtitle">Menu Koleksi 2026</p> -->
          <h1 class="page-title">Katalog Produk</h1>
        </div>
      </div>
      <div class="header-right">
        <div class="icon-btn" (click)="fetchProducts(); fetchCategories()">
          <ion-icon name="refresh-outline"></ion-icon>
        </div>
      </div>
    </div>

    <!-- SEARCH & DISCOVERY -->
    <div class="discovery-section">
      <div class="search-box">
        <ion-icon name="search-outline"></ion-icon>
        <input type="text" 
               placeholder="Cari kopi favorit Anda..." 
               (input)="handleSearch($event)">
      </div>

      <!-- CATEGORY PILLS -->
      <div class="category-nav">
        <div class="pills-container hide-scrollbar">
          <button 
            (click)="selectCategory('all')" 
            [class.active]="selectedCategoryId === 'all'"
            class="pill">
            SEMUA
          </button>
          <button 
            *ngFor="let cat of categories"
            (click)="selectCategory(cat.id)"
            [class.active]="selectedCategoryId === cat.id"
            class="pill">
            {{ cat.category_name | uppercase }}
          </button>
        </div>
      </div>
    </div>

    <!-- PRODUCT LISTING -->
    <div *ngIf="loadingProducts" class="product-grid">
      <div *ngFor="let s of [1,2,3,4,5,6]" class="product-card skeleton-pulse">
        <div class="image-box skeleton-line opacity-10"></div>
        <div class="info-box">
          <div class="skeleton-line w-32 h-4 mb-2"></div>
          <div class="skeleton-line w-24 h-3"></div>
        </div>
      </div>
    </div>

    <div *ngIf="!loadingProducts" class="product-grid">
      <div *ngFor="let p of products" class="product-card">
        <!-- NEW BADGE -->
        <div *ngIf="p.isNew" class="badge-new">NEW</div>

        <div class="image-box">
          <img *ngIf="p.imageUrl; else noImg" [src]="p.imageUrl" alt="product">
          <ng-template #noImg>
            <div class="thumb-placeholder">
              <ion-icon name="cafe-outline"></ion-icon>
            </div>
          </ng-template>
        </div>

        <div class="info-box">
          <h3 class="product-name">{{ p.product_name }}</h3>
          <div class="price-row">
            <span class="price">Rp {{ formatPrice(p.price) }}</span>
            <div *ngIf="p.is_exchangeable" class="points-badge">
              <ion-icon name="star"></ion-icon>
              <span>{{ p.point_price }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- EMPTY STATE -->
    <div *ngIf="!loadingProducts && products.length === 0" class="empty-state">
      <div class="empty-icon-box">
        <ion-icon name="search-outline"></ion-icon>
      </div>
      <h3>Tidak Ditemukan</h3>
      <p>Kata kunci "{{ searchQuery }}" tidak cocok dengan produk manapun.</p>
    </div>

  </div>
</ion-content>
