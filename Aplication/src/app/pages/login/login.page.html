<ion-content fullscreen class="bg-gray-100">

  <div class="min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-5xl h-[540px] bg-white rounded-2xl shadow-2xl flex overflow-hidden">

      <!-- LEFT -->
      <div class="w-1/2 flex items-center justify-center">
        <div class="w-full max-w-sm text-center">

          <!-- LOGO -->
          <img
            src="assets/fourtyPOS.png"
            alt="FourtyPOS"
            class="mx-auto mb-6 w-40"
          />

          <p class="text-sm text-gray-500 mb-6">
            Masuk ke akun Anda untuk melanjutkan
          </p>

          <!-- USERNAME -->
          <div class="mb-4">
            <ion-input
              class="bg-gray-100 rounded-lg px-4 py-2 text-sm"
              placeholder="Username">
            </ion-input>
          </div>

          <!-- PASSWORD -->
          <div class="mb-3">
            <ion-input
              type="password"
              class="bg-gray-100 rounded-lg px-4 py-2 text-sm"
              placeholder="Password">
            </ion-input>
          </div>

          <div class="text-right mb-6">
            <a class="text-xs text-gray-600 cursor-pointer hover:underline">
              Lupa kata sandi?
            </a>
          </div>

          <ion-button
            expand="block"
            class="rounded-full font-semibold tracking-wide"
            color="success">
            SIGN IN
          </ion-button>

        </div>
      </div>

      <!-- RIGHT -->
      <div class="w-1/2 bg-emerald-500 flex items-center justify-center text-white">
        <div class="text-center max-w-xs">

          <h1 class="text-3xl font-extrabold mb-4">
            Halo, Teman!
          </h1>

          <p class="text-sm leading-relaxed mb-8">
            Daftarkan diri Anda dan mulai gunakan
            layanan kami segera
          </p>

          <button
            class="border-2 border-white px-10 py-2 rounded-full font-semibold tracking-wide hover:bg-white hover:text-emerald-500 transition">
            SIGN UP
          </button>

        </div>
      </div>

    </div>

  </div>

</ion-content>
