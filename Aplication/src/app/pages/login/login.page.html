<ion-content
  fullscreen
  class="bg-white"
  style="--background: #ededed;"
>
  <div class="min-h-screen flex items-center justify-center px-4">

    <div
      class="
        w-full
        max-w-5xl
        bg-white
        rounded-3xl
        shadow-2xl
        flex
        overflow-hidden
        md:h-[560px]
      "
    >

      <!-- LEFT (LOGIN) -->
      <div class="w-full md:w-1/2 flex items-center justify-center py-12">
        <div class="w-full max-w-sm text-center px-6">

          <!-- LOGO -->
          <img
            src="assets/fourtyPOS.png"
            alt="FourtyPOS"
            class="mx-auto mb-10 w-36"
          />

          <h2 class="text-xl font-semibold text-gray-800 mb-2">
            Selamat Datang Kembali
          </h2>

          <p class="text-sm text-gray-500 mb-10">
            Masuk ke akun Anda untuk melanjutkan
          </p>

          <!-- USERNAME -->
          <div class="mb-5">
<ion-input
  [(ngModel)]="username"
  placeholder="Username"
  class="bg-gray-100 rounded-full px-6 py-4 text-black"
></ion-input>

          </div>

          <!-- PASSWORD -->
          <div class="mb-4">
<ion-input
  type="password"
  [(ngModel)]="password"
  placeholder="Password"
  class="bg-gray-100 rounded-full px-6 py-4 text-black"
></ion-input>

          </div>

          <div class="text-right mb-8">
            <a
              class="text-xs text-gray-600 cursor-pointer hover:text-emerald-500 transition"
            >
              Lupa kata sandi?
            </a>
          </div>

          <!-- BUTTON -->
          <button
            type="button"
            (click)="login()"
            class="w-full h-14 bg-emerald-500 rounded-full text-white font-semibold"
          >
            {{ loading ? 'Loading...' : 'SIGN IN' }}
          </button>
        </div>
      </div>

      <!-- RIGHT (HIDDEN ON MOBILE) -->
      <div
        class="
          hidden
          md:flex
          w-1/2
          bg-gradient-to-br
          from-emerald-400
          to-emerald-600
          items-center
          justify-center
          text-white
        "
      >
        <div class="text-center max-w-xs px-6">

          <h1 class="text-3xl font-extrabold mb-4">
            Halo, Teman!
          </h1>

          <p class="text-sm leading-relaxed mb-10 text-emerald-100">
            Daftarkan diri Anda dan mulai gunakan layanan kami segera
          </p>

          <button
            class="
              border-2 border-white
              px-10 py-3
              rounded-full
              font-semibold
              tracking-wide
              hover:bg-white
              hover:text-emerald-600
              active:scale-[0.97]
              transition-all
            "
          >
            SIGN UP
          </button>

        </div>
      </div>

    </div>

  </div>
</ion-content>
