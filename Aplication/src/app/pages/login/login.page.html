<ion-content fullscreen class="bg-black">
  <div class="min-h-screen flex items-center justify-center p-8">
    
    <div class="w-full max-w-sm">
      <div class="mb-16">
        <h1 class="text-4xl font-bold text-white tracking-tighter leading-none mb-1">THE44</h1>
        <p class="text-[10px] text-zinc-600 tracking-[0.4em] uppercase font-medium">System Access</p>
      </div>

      <div class="space-y-10">
        
        <div class="relative">
          <label class="text-[9px] text-zinc-500 uppercase tracking-widest absolute -top-5 left-0">Username</label>
          <ion-input
            [(ngModel)]="username"
            placeholder="TYPE HERE"
            class="input-plain"
          ></ion-input>
        </div>

        <div class="relative">
          <label class="text-[9px] text-zinc-500 uppercase tracking-widest absolute -top-5 left-0">Password</label>
          <ion-input
            type="password"
            [(ngModel)]="password"
            placeholder="********"
            class="input-plain"
          ></ion-input>
          <a href="#" class="text-[9px] text-zinc-700 absolute right-0 -bottom-5 hover:text-white transition-colors">FORGOT?</a>
        </div>

        <div class="pt-4">
          <button
            (click)="login()"
            class="btn-plain w-full"
            [disabled]="loading"
          >
            <span *ngIf="!loading">SIGN IN</span>
            <ion-spinner *ngIf="loading" name="lines-sharp" color="dark"></ion-spinner>
          </button>
        </div>

        <div class="flex justify-between items-center pt-10">
          <button class="text-[10px] text-white font-bold hover:underline decoration-1 underline-offset-4">
            REGISTER
          </button>
          <span class="text-zinc-800 text-[10px]">VER. 1.0.44</span>
        </div>

      </div>
    </div>
    
  </div>
</ion-content>
