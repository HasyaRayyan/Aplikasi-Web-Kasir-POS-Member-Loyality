<ion-content
  fullscreen
  style="--background: #f7f7f5;"
>
  <div class="p-5 space-y-8">

    <!-- METRIC CARDS -->
    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5">

      <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
        <p class="text-sm text-gray-500">Total Member</p>
        <div class="flex items-center justify-between mt-3">
          <h2 class="text-3xl font-bold text-gray-800">1.250</h2>
          <div class="w-11 h-11 flex items-center justify-center rounded-full bg-blue-50 text-blue-600 text-lg">
            👤
          </div>
        </div>
      </div>

      <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
        <p class="text-sm text-gray-500">Total Produk</p>
        <div class="flex items-center justify-between mt-3">
          <h2 class="text-3xl font-bold text-gray-800">320</h2>
          <div class="w-11 h-11 flex items-center justify-center rounded-full bg-emerald-50 text-emerald-600 text-lg">
            📦
          </div>
        </div>
      </div>

      <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
        <p class="text-sm text-gray-500">Transaksi Hari Ini</p>
        <div class="flex items-center justify-between mt-3">
          <h2 class="text-3xl font-bold text-gray-800">87</h2>
          <div class="w-11 h-11 flex items-center justify-center rounded-full bg-yellow-50 text-yellow-600 text-lg">
            💳
          </div>
        </div>
      </div>

      <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
        <p class="text-sm text-gray-500">Poin Digunakan</p>
        <div class="flex items-center justify-between mt-3">
          <h2 class="text-3xl font-bold text-gray-800">4.500</h2>
          <div class="w-11 h-11 flex items-center justify-center rounded-full bg-red-50 text-red-600 text-lg">
            ⭐
          </div>
        </div>
      </div>

    </div>

    <!-- QUICK ACTION -->
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
      <h3 class="text-base font-semibold text-gray-800 mb-5">
        Menu Cepat
      </h3>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <button class="h-12 rounded-full border border-blue-500 text-blue-600 hover:bg-blue-50 transition">
          Produk
        </button>
        <button class="h-12 rounded-full border border-emerald-500 text-emerald-600 hover:bg-emerald-50 transition">
          Member
        </button>
        <button class="h-12 rounded-full border border-yellow-500 text-yellow-600 hover:bg-yellow-50 transition">
          Transaksi
        </button>
        <button class="h-12 rounded-full border border-gray-600 text-gray-700 hover:bg-gray-100 transition">
          Laporan
        </button>
      </div>
    </div>

  </div>
</ion-content>
