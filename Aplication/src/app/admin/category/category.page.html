<div class="min-h-screen bg-white p-4 md:p-8">

  <!-- HEADER -->
  <div class="mb-8">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
      <div>
        <h1 class="text-3xl md:text-4xl font-bold text-gray-900">
          Daftar Kategori
        </h1>
        <p class="text-gray-600 mt-2">Kelola kategori produk</p>
      </div>

      <button
        (click)="openAddModal()"
        class="group inline-flex items-center gap-2 bg-gray-900 
              hover:bg-black text-white font-semibold px-6 py-3.5 rounded-lg 
              transition shadow-md hover:-translate-y-0.5">

        <ion-icon name="add-outline"></ion-icon>
        Tambah Kategori
      </button>
    </div>

    <!-- SEARCH -->
    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-200">
      <div class="relative">
        <ion-icon name="search-outline"
          class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></ion-icon>

        <input [(ngModel)]="search"
          (keyup.enter)="loadData()"
          placeholder="Cari kategori..."
          class="w-full pl-12 pr-4 py-3.5 bg-white text-black
                 border border-gray-300 rounded-lg
                 focus:border-gray-900 focus:ring-2 focus:ring-gray-200
                 outline-none transition">
      </div>
    </div>
  </div>

  <!-- SPINNER -->
  <div *ngIf="loading"
    class="fixed inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-50">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

<!-- TABLE -->
<div *ngIf="!loading"
  class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">

  <!-- HEADER TABLE -->
  <div class="hidden md:grid grid-cols-12 bg-gray-50 px-6 py-4 border-b">
    <div class="col-span-2 font-semibold text-gray-700">NO</div>
    <div class="col-span-8 font-semibold text-gray-700">NAMA KATEGORI</div>
    <div class="col-span-2 font-semibold text-gray-700 text-right">AKSI</div>
  </div>

  <!-- ROW -->
  <div *ngFor="let c of categories; let i = index"
    class="border-b hover:bg-gray-50 transition">

    <!-- DESKTOP -->
    <div class="hidden md:grid grid-cols-12 px-6 py-5 items-center">

      <!-- NO -->
      <div class="col-span-2 font-semibold text-gray-900">
        {{ i + 1 }}
      </div>

      <!-- NAMA -->
      <div class="col-span-8 flex items-center gap-3">
        <div class="w-10 h-10 bg-gray-100 rounded-lg flex items-center justify-center">
          <span class="font-bold text-gray-700">
            {{ c.category_name[0] }}
          </span>
        </div>

        <span class="font-medium text-gray-800">
          {{ c.category_name }}
        </span>
      </div>

      <!-- AKSI -->
      <div class="col-span-2 flex justify-end gap-1">
        <button (click)="openEditModal(c)"
          class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg">
          <ion-icon name="create-outline"></ion-icon>
        </button>

        <button (click)="delete(c.id)"
          class="p-2 text-red-500 hover:bg-red-50 rounded-lg">
          <ion-icon name="trash-outline"></ion-icon>
        </button>
      </div>

    </div>

    <!-- MOBILE -->
    <div class="md:hidden p-5 space-y-2">

      <div class="flex justify-between items-center">
        <p class="font-bold">
          {{ i + 1 }}. {{ c.category_name }}
        </p>
      </div>

      <div class="flex gap-2">
        <button (click)="openEditModal(c)"
          class="flex-1 py-2 bg-blue-500 text-white rounded-lg text-sm">
          Edit
        </button>
        <button (click)="delete(c.id)"
          class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm">
          Hapus
        </button>
      </div>

    </div>

  </div>
</div>

</div>
<!-- MODAL TAMBAH / EDIT -->
<div *ngIf="showModal"
  class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[9999] p-4">

  <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden flex flex-col">

    <!-- HEADER -->
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gray-900 text-white rounded-lg flex items-center justify-center">
          <ion-icon [name]="isEdit ? 'create-outline' : 'add-outline'"></ion-icon>
        </div>

        <div>
          <h2 class="font-bold text-lg text-gray-900">
            {{ isEdit ? 'Edit Kategori' : 'Tambah Kategori' }}
          </h2>
          <p class="text-xs text-gray-500">
            Nama kategori akan tampil di produk
          </p>
        </div>
      </div>

      <button (click)="closeModal()" class="text-gray-500 hover:text-black">
        <ion-icon name="close-outline" class="text-2xl"></ion-icon>
      </button>
    </div>

    <!-- BODY -->
    <div class="p-6 space-y-4">

      <div>
        <label class="text-xs font-semibold text-gray-600 mb-1 block">
          Nama Kategori
        </label>

        <input [(ngModel)]="form.category_name"
          placeholder="Contoh: Minuman"
          class="w-full bg-white text-black border border-gray-300 rounded-lg px-4 py-2.5
                 placeholder-gray-400
                 focus:border-gray-900 focus:ring-2 focus:ring-gray-200
                 outline-none transition">

        <p class="text-[11px] text-gray-400 mt-1">
          Maksimal 100 karakter
        </p>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="px-6 py-4 border-t flex justify-end gap-3 bg-gray-50">
      <button (click)="closeModal()"
        class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-100">
        Batal
      </button>

      <button (click)="isEdit ? update() : save()"
        class="px-6 py-2 bg-gray-900 text-white rounded-lg hover:bg-black shadow-sm">
        {{ isEdit ? 'Update' : 'Simpan' }}
      </button>
    </div>

  </div>
</div>
<ion-alert
  [isOpen]="showDeleteAlert"
  header="Hapus Kategori?"
  message="Kategori akan dihapus permanen"
  [buttons]="deleteButtons">
</ion-alert>
