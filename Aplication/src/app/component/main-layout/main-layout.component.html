
  <app-sidebar></app-sidebar>


<!-- PAGE ROOT -->
<div id="main-content" class="ion-page">

  <!-- ✅ SCROLL CONTAINER -->
  <ion-content class="bg-[#f8fafc]">

    <div class="p-4 md:p-6 space-y-6">

      <!-- HEADER -->
      <div class="rounded-3xl px-6 md:px-8 py-5 bg-[#020617] text-white shadow-sm">
        <div class="flex justify-between items-center flex-wrap gap-3">

          <div class="flex items-center gap-2 flex-wrap">
            <span class="text-sm md:text-lg font-semibold text-slate-400">
              Hallo
            </span>

            <span class="text-sm md:text-lg font-semibold text-white">
              {{ name }}
            </span>

            <span class="hidden lg:inline text-lg font-semibold text-slate-400">
              Have A Good Day !!
            </span>
          </div>

          <div class="hidden md:flex items-center gap-2 text-xs text-slate-400">
            <ion-icon name="calendar-outline"></ion-icon>
            {{ today }}
          </div>

        </div>
      </div>

      <!-- ROUTER CONTENT -->
      <div class="bg-white rounded-3xl p-6 min-h-[400px]">
        <router-outlet></router-outlet>
      </div>

    </div>

  </ion-content>

</div>
